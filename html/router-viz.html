<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>Qwen3 MoE Router Visualizer</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family: 'Segoe UI', sans-serif; background:#0d1117; color:#c9d1d9; display:flex; flex-direction:column; height:100vh; }

#header { padding:10px 16px; border-bottom:1px solid #30363d; background:#161b22; display:flex; align-items:center; gap:10px; flex-wrap:wrap; }
#header h1 { font-size:1em; color:#58a6ff; }
.btn { padding:5px 12px; border-radius:6px; border:1px solid #30363d; background:#21262d; color:#c9d1d9; cursor:pointer; font-size:0.82em; }
.btn:hover { background:#30363d; }
.btn.primary { background:#1f6feb; border-color:#1f6feb; color:#fff; }
.btn.active { background:#238636; border-color:#238636; }
#fileInput { display:none; }
#modelStatus { font-size:0.78em; color:#8b949e; margin-left:auto; }
#modelStatus.ready { color:#3fb950; }
#progressBar { width:160px; height:5px; background:#21262d; border-radius:3px; overflow:hidden; display:none; }
#progressFill { height:100%; background:#1f6feb; width:0%; transition:width 0.3s; }

#main { display:flex; flex:1; overflow:hidden; }

/* --- Left panel --- */
#leftPanel { width:300px; flex-shrink:0; border-right:1px solid #30363d; display:flex; flex-direction:column; overflow:hidden; }

#promptArea { padding:10px; border-bottom:1px solid #30363d; }
#promptArea textarea { width:100%; height:80px; background:#0d1117; border:1px solid #30363d; color:#c9d1d9; padding:6px; border-radius:4px; font-size:0.85em; resize:vertical; font-family:inherit; }
#promptArea button { margin-top:6px; width:100%; }

#tokenList { flex:1; overflow-y:auto; padding:8px; }
#tokenList h3 { font-size:0.8em; color:#8b949e; margin-bottom:6px; padding-bottom:4px; border-bottom:1px solid #30363d; }
.token-item { padding:4px 8px; border-radius:4px; cursor:pointer; font-size:0.82em; margin-bottom:2px; border:1px solid transparent; white-space:pre-wrap; word-break:break-all; }
.token-item:hover { background:#21262d; }
.token-item.selected { background:#1f3a5f; border-color:#1f6feb; }
.token-item .tok-id { color:#8b949e; font-size:0.78em; }

#controls { padding:8px; border-top:1px solid #30363d; font-size:0.8em; display:flex; gap:12px; align-items:center; flex-wrap:wrap; }
#controls label { display:flex; align-items:center; gap:4px; }

/* --- Right panel --- */
#rightPanel { flex:1; display:flex; flex-direction:column; overflow:hidden; min-width:0; }

#vizArea { flex:1; overflow:auto; padding:10px; }
#vizArea h2 { font-size:0.85em; color:#8b949e; margin-bottom:6px; }

#canvasWrapper { position:relative; overflow:auto; }
#mainCanvas { display:block; cursor:crosshair; }

/* Floating tooltip */
#canvasTooltip {
    position:fixed; display:none; background:#161b22; border:1px solid #30363d;
    padding:4px 8px; border-radius:4px; font-size:0.75em; pointer-events:none; z-index:100;
    white-space:nowrap; color:#c9d1d9;
}

#statsPanel { padding:8px 12px; border-top:1px solid #30363d; font-size:0.8em; color:#8b949e; background:#161b22; display:flex; gap:20px; flex-wrap:wrap; }

#breakpointPanel { padding:6px 12px; border-top:1px solid #30363d; background:#161b22; }
#breakpointPanel h3 { font-size:0.78em; color:#8b949e; margin-bottom:4px; }
#bpList { display:flex; gap:6px; flex-wrap:wrap; align-items:center; }
.bp-chip { padding:2px 8px; background:#21262d; border:1px solid #30363d; border-radius:12px; font-size:0.75em; cursor:pointer; }
.bp-chip:hover { border-color:#f85149; }
</style>
</head>
<body>

<div id="header">
  <h1>MoE Router Visualizer</h1>
  <button class="btn" onclick="document.getElementById('fileInput').click()">📂 GGUFを読み込む</button>
  <input type="file" id="fileInput" accept=".gguf">
  <div id="progressBar"><div id="progressFill"></div></div>
  <span id="modelStatus">モデル未読込</span>
  <button id="gpuToggle" class="btn" onclick="toggleGPU()">GPU: Auto</button>
</div>

<div id="main">
  <div id="leftPanel">
    <div id="promptArea">
      <textarea id="promptInput" placeholder="プロンプトを入力...">こんにちは！</textarea>
      <button class="btn primary" id="genBtn" onclick="startGeneration()" disabled>生成開始</button>
    </div>
    <div id="tokenList">
      <h3>生成トークン (<span id="tokenCount">0</span>)</h3>
      <div id="tokenItems"></div>
    </div>
    <div id="controls">
      <label>Max: <input type="number" id="maxTokens" value="64" min="1" max="512" style="width:55px; background:#0d1117; border:1px solid #30363d; color:#c9d1d9; padding:2px 4px; border-radius:3px;"></label>
      <label>Temp: <input type="number" id="tempInput" value="0.7" min="0" max="2" step="0.1" style="width:50px; background:#0d1117; border:1px solid #30363d; color:#c9d1d9; padding:2px 4px; border-radius:3px;"></label>
    </div>
  </div>

  <div id="rightPanel">
    <div id="vizArea">
      <h2 id="vizTitle">Expert活性化マップ（全レイヤー × Expert）— トークンを選択してください</h2>
      <div id="canvasWrapper">
        <canvas id="mainCanvas"></canvas>
      </div>
    </div>
    <div id="statsPanel">
      <span id="statToken">トークン: -</span>
      <span id="statExperts">Top experts: -</span>
      <span id="statTPS">速度: - tok/s</span>
    </div>
    <div id="breakpointPanel">
      <h3>ブレークポイント</h3>
      <div id="bpList">
        <button class="btn" onclick="addBreakpoint()" style="font-size:0.75em; padding:2px 8px;">+ 追加</button>
      </div>
    </div>
  </div>
</div>

<div id="canvasTooltip"></div>

<script src="../src/gguf.js"></script>
<script src="../src/tokenizer.js"></script>
<script src="../src/tensor.js"></script>
<script src="../src/kv-cache.js"></script>
<script src="../src/qwen3-engine.js"></script>
<script src="../src/webgpu.js"></script>

<script>
let engine = null;
let useGPU = true;

// routerData[outputTokenIdx][layerIdx] = { probs, selected }
let routerData = [];
let pendingRouterUpdates = {};  // accumulates during a single forward pass
let prefillDone = false;        // true after first onToken fires

let selectedTokenIdx = -1;
let maskedExperts = new Set();
let breakpoints = [];
let isGenerating = false;
let startTime = 0;
let tokenCount = 0;
let nExpertsTotal = 0;

const LABEL_W = 28;  // space for layer number labels on left
let lastCellW = 1, lastCellH = 1;  // updated each draw, reused by event handlers

function getCellSize(nLayers) {
    const wrapper = document.getElementById('canvasWrapper');
    const vizArea = document.getElementById('vizArea');
    const availW = Math.max(1, wrapper.clientWidth - LABEL_W - 4);
    const availH = Math.max(1, vizArea.clientHeight - 36); // subtract title height
    const cellW = Math.max(1, Math.floor(availW / (nExpertsTotal || 128)));
    const cellH = nLayers > 0 ? Math.max(2, Math.floor(availH / nLayers)) : cellW;
    return { cellW, cellH };
}

// --- Model Loading ---
document.getElementById('fileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;
    const status = document.getElementById('modelStatus');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');
    status.textContent = '読み込み中...';
    status.className = '';
    progressBar.style.display = 'block';
    progressFill.style.width = '0%';
    try {
        const gguf = await GGUFReader.fromFile(file, (progress) => {
            progressFill.style.width = `${progress * 90}%`;
        });
        progressFill.style.width = '95%';
        if (useGPU) {
            try {
                engine = await Qwen3GPUEngine.create(gguf);
                status.textContent = `[GPU] ${gguf.getKeyValue('general.name', file.name)}`;
            } catch (gpuErr) {
                console.warn('GPU failed, CPU fallback:', gpuErr);
                engine = new Qwen3Engine(gguf);
                status.textContent = `[CPU] ${gguf.getKeyValue('general.name', file.name)}`;
            }
        } else {
            engine = new Qwen3Engine(gguf);
            status.textContent = `[CPU] ${gguf.getKeyValue('general.name', file.name)}`;
        }
        progressFill.style.width = '100%';
        setTimeout(() => { progressBar.style.display = 'none'; }, 500);
        status.className = 'ready';
        nExpertsTotal = engine.isMoE ? (engine.layers.find(l => l.isMoE)?.nExperts || 128) : 0;
        document.getElementById('genBtn').disabled = false;
        resetViz();
    } catch (err) {
        status.textContent = `エラー: ${err.message}`;
        progressBar.style.display = 'none';
        console.error(err);
    }
});

function toggleGPU() {
    useGPU = !useGPU;
    document.getElementById('gpuToggle').textContent = `GPU: ${useGPU ? 'ON' : 'OFF'}`;
    document.getElementById('gpuToggle').className = useGPU ? 'btn active' : 'btn';
}

function resetViz() {
    routerData = [];
    pendingRouterUpdates = {};
    prefillDone = false;
    selectedTokenIdx = -1;
    tokenCount = 0;
    document.getElementById('tokenItems').innerHTML = '';
    document.getElementById('tokenCount').textContent = '0';
    document.getElementById('vizTitle').textContent =
        `Expert活性化マップ（全レイヤー × ${nExpertsTotal} Expert）— トークンを選択してください`;
    const canvas = document.getElementById('mainCanvas');
    canvas.width = 0; canvas.height = 0;
}

// --- Generation ---
async function startGeneration() {
    if (isGenerating) return;
    isGenerating = true;
    resetViz();
    startTime = performance.now();

    document.getElementById('genBtn').disabled = true;

    const prompt = document.getElementById('promptInput').value;
    const chatText = engine.formatChat([{ role: 'user', content: prompt }], null);
    const tokenIds = engine.tokenizer.tokenize(chatText, true, false);
    const maxSteps = parseInt(document.getElementById('maxTokens').value) || 64;
    const temperature = parseFloat(document.getElementById('tempInput').value) || 0.7;

    engine.expertMask = maskedExperts;

    // Router callback: accumulate per-forward-pass, ignore prefill
    engine.onRouterUpdate = (data) => {
        if (!prefillDone) {
            // During prefill: keep overwriting so only the last prompt token's data
            // remains in pending when the first onToken fires
            pendingRouterUpdates = {};
        }
        pendingRouterUpdates[data.layer] = {
            probs: data.probs,
            selected: data.selected,
        };
    };

    await engine.generate(tokenIds, {
        maxSteps,
        temperature,
        topP: 0.9,
        topK: 40,
        onToken: (tokenId) => {
            // First onToken means prefill is done; commit the pending router data
            prefillDone = true;
            const idx = tokenCount;
            routerData[idx] = { ...pendingRouterUpdates };
            pendingRouterUpdates = {};

            tokenCount++;
            document.getElementById('tokenCount').textContent = tokenCount;

            const text = engine.tokenizer.decode([tokenId]);
            addTokenChip(tokenId, text, idx);

            const elapsed = (performance.now() - startTime) / 1000;
            document.getElementById('statTPS').textContent =
                `速度: ${(tokenCount / elapsed).toFixed(1)} tok/s`;

            // Auto-select latest token
            selectToken(idx);
        },
    });

    isGenerating = false;
    document.getElementById('genBtn').disabled = false;
    engine.onRouterUpdate = null;
}

function addTokenChip(tokenId, text, idx) {
    const el = document.createElement('div');
    el.className = 'token-item';
    el.id = `tok-${idx}`;
    el.innerHTML = `<span>${escHtml(text || '?')}</span> <span class="tok-id">#${tokenId}</span>`;
    el.onclick = () => selectToken(idx);
    document.getElementById('tokenItems').appendChild(el);
    el.scrollIntoView({ block: 'nearest' });
}

function selectToken(idx) {
    document.querySelectorAll('.token-item.selected').forEach(e => e.classList.remove('selected'));
    const el = document.getElementById(`tok-${idx}`);
    if (el) el.classList.add('selected');
    selectedTokenIdx = idx;
    drawAllLayers(idx);

    const data = routerData[idx];
    if (data) {
        const layers = Object.keys(data).sort((a,b)=>a-b);
        const lastLayer = data[layers[layers.length-1]];
        if (lastLayer) {
            document.getElementById('statToken').textContent = `トークン: ${idx}`;
            document.getElementById('statExperts').textContent =
                `Top experts (L${layers[layers.length-1]}): ${lastLayer.selected?.slice(0,4).join(', ')}...`;
        }
    }
}

// --- Canvas rendering ---
function drawAllLayers(tokenIdx) {
    const data = routerData[tokenIdx];
    if (!data || nExpertsTotal === 0) return;

    const layers = Object.keys(data).map(Number).sort((a,b)=>a-b);
    const nLayers = layers.length;
    const nExperts = nExpertsTotal;

    const { cellW, cellH } = getCellSize(nLayers);
    lastCellW = cellW; lastCellH = cellH;

    const canvas = document.getElementById('mainCanvas');
    canvas.width  = LABEL_W + nExperts * cellW;
    canvas.height = nLayers * cellH;
    const ctx = canvas.getContext('2d');
    ctx.clearRect(0, 0, canvas.width, canvas.height);

    const showLabel = cellH >= 7;  // only draw text if tall enough

    layers.forEach((layerIdx, li) => {
        const { probs, selected } = data[layerIdx];
        const maxP = Math.max(...probs);

        if (showLabel) {
            ctx.fillStyle = '#6e7681';
            ctx.font = `${Math.min(cellH - 2, 11)}px monospace`;
            ctx.fillText(`${layerIdx}`, 0, li * cellH + cellH - 2);
        }

        probs.forEach((p, ei) => {
            const intensity = maxP > 0 ? p / maxP : 0;
            const isSelected = selected && selected.includes(ei);
            if (isSelected) {
                const v = Math.round(80 + 175 * intensity);
                ctx.fillStyle = `rgb(255,${v},0)`;
            } else if (intensity > 0.01) {
                const b = Math.round(80 + 150 * intensity);
                ctx.fillStyle = `rgb(20,50,${b})`;
            } else {
                ctx.fillStyle = '#0d1117';
            }
            const gap = cellW > 2 ? 1 : 0;
            ctx.fillRect(LABEL_W + ei * cellW, li * cellH, cellW - gap, cellH - gap);
        });
    });

    document.getElementById('vizTitle').textContent =
        `Expert活性化マップ — トークン ${tokenIdx}（${nLayers} MoEレイヤー × ${nExperts} Expert）`;
}

// --- Canvas tooltip ---
document.getElementById('mainCanvas').addEventListener('mousemove', (e) => {
    if (selectedTokenIdx < 0) return;
    const data = routerData[selectedTokenIdx];
    if (!data) return;

    const canvas = document.getElementById('mainCanvas');
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;

    const layers = Object.keys(data).map(Number).sort((a,b)=>a-b);
    const li = Math.floor(y / lastCellH);
    const ei = Math.floor((x - LABEL_W) / lastCellW);
    if (li < 0 || li >= layers.length || ei < 0 || ei >= nExpertsTotal) {
        document.getElementById('canvasTooltip').style.display = 'none';
        return;
    }

    const layerIdx = layers[li];
    const { probs, selected } = data[layerIdx];
    const prob = probs[ei];
    const isSel = selected && selected.includes(ei);
    const tip = document.getElementById('canvasTooltip');
    tip.textContent = `Layer ${layerIdx} / Expert ${ei}  prob: ${prob.toFixed(4)}${isSel ? ' ★' : ''}`;
    tip.style.display = 'block';
    tip.style.left = (e.clientX + 12) + 'px';
    tip.style.top  = (e.clientY - 6) + 'px';
});
document.getElementById('mainCanvas').addEventListener('mouseleave', () => {
    document.getElementById('canvasTooltip').style.display = 'none';
});

// --- Expert mask (click on canvas) ---
document.getElementById('mainCanvas').addEventListener('click', (e) => {
    if (selectedTokenIdx < 0) return;
    const data = routerData[selectedTokenIdx];
    if (!data) return;
    const canvas = document.getElementById('mainCanvas');
    const rect = canvas.getBoundingClientRect();
    const x = e.clientX - rect.left;
    const y = e.clientY - rect.top;
    const layers = Object.keys(data).map(Number).sort((a,b)=>a-b);
    const li = Math.floor(y / lastCellH);
    const ei = Math.floor((x - LABEL_W) / lastCellW);
    if (li < 0 || li >= layers.length || ei < 0 || ei >= nExpertsTotal) return;

    if (maskedExperts.has(ei)) {
        maskedExperts.delete(ei);
    } else {
        maskedExperts.add(ei);
    }
    if (engine) engine.expertMask = maskedExperts;
    drawAllLayers(selectedTokenIdx);  // redraw to show mask
});

// --- Breakpoints ---
function addBreakpoint() {
    const type = prompt('ブレークポイントタイプ:\n1: token文字列\n2: expert番号\n3: tokenId', '1');
    if (!type) return;
    let bp;
    if (type === '1') {
        const val = prompt('停止する文字列:');
        if (!val) return;
        bp = { type: 'token', value: val };
    } else if (type === '2') {
        const val = parseInt(prompt('停止するExpert番号:'));
        if (isNaN(val)) return;
        bp = { type: 'expert', value: val };
    } else {
        const val = parseInt(prompt('停止するToken ID:'));
        if (isNaN(val)) return;
        bp = { type: 'tokenId', value: val };
    }
    breakpoints.push(bp);
    renderBreakpoints();
}

function renderBreakpoints() {
    const list = document.getElementById('bpList');
    list.innerHTML = '<button class="btn" onclick="addBreakpoint()" style="font-size:0.75em; padding:2px 8px;">+ 追加</button>';
    breakpoints.forEach((bp, i) => {
        const chip = document.createElement('span');
        chip.className = 'bp-chip';
        chip.textContent = `${bp.type}:${bp.value} ✕`;
        chip.onclick = () => { breakpoints.splice(i, 1); renderBreakpoints(); };
        list.appendChild(chip);
    });
}

function escHtml(s) { return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;'); }

// Redraw on resize
new ResizeObserver(() => {
    if (selectedTokenIdx >= 0) drawAllLayers(selectedTokenIdx);
}).observe(document.getElementById('vizArea'));
</script>
</body>
</html>
