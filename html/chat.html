<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>LLM Chat</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', sans-serif; background: #0d1117; color: #c9d1d9; height: 100vh; display: flex; flex-direction: column; }

#header { padding: 12px 20px; border-bottom: 1px solid #30363d; display: flex; align-items: center; gap: 12px; background: #161b22; }
#header h1 { font-size: 1.1em; color: #58a6ff; }
#fileInput { display: none; }
.btn { padding: 6px 14px; border-radius: 6px; border: 1px solid #30363d; background: #21262d; color: #c9d1d9; cursor: pointer; font-size: 0.85em; }
.btn:hover { background: #30363d; }
.btn.primary { background: #1f6feb; border-color: #1f6feb; color: #fff; }
.btn.primary:hover { background: #388bfd; }
.btn:disabled { opacity: 0.5; cursor: not-allowed; }

#modelStatus { font-size: 0.8em; color: #8b949e; margin-left: auto; }
#modelStatus.ready { color: #3fb950; }

#progressBar { width: 200px; height: 6px; background: #21262d; border-radius: 3px; overflow: hidden; display: none; }
#progressFill { height: 100%; background: #1f6feb; width: 0%; transition: width 0.3s; }

#chatContainer { flex: 1; overflow-y: auto; padding: 20px; }
.message { margin-bottom: 16px; display: flex; gap: 12px; max-width: 800px; margin-left: auto; margin-right: auto; }
.message.user { flex-direction: row-reverse; }
.msg-avatar { width: 32px; height: 32px; border-radius: 8px; display: flex; align-items: center; justify-content: center; font-size: 0.9em; flex-shrink: 0; }
.message.user .msg-avatar { background: #1f6feb; color: #fff; }
.message.assistant .msg-avatar { background: #238636; color: #fff; }
.msg-content { padding: 10px 14px; border-radius: 12px; line-height: 1.6; font-size: 0.95em; white-space: pre-wrap; word-break: break-word; max-width: 70%; }
.message.user .msg-content { background: #1f6feb; color: #fff; border-bottom-right-radius: 4px; }
.message.assistant .msg-content { background: #161b22; border: 1px solid #30363d; border-bottom-left-radius: 4px; }

#inputArea { padding: 16px 20px; border-top: 1px solid #30363d; background: #161b22; display: flex; gap: 8px; max-width: 800px; margin: 0 auto; width: 100%; }
#messageInput { flex: 1; padding: 10px 14px; border-radius: 8px; border: 1px solid #30363d; background: #0d1117; color: #c9d1d9; font-size: 0.95em; resize: none; outline: none; font-family: inherit; }
#messageInput:focus { border-color: #1f6feb; }
#sendBtn { align-self: flex-end; padding: 10px 20px; }

#settings { padding: 8px 20px; background: #161b22; border-bottom: 1px solid #30363d; display: none; gap: 16px; align-items: center; font-size: 0.8em; color: #8b949e; }
#settings.visible { display: flex; }
#settings label { display: flex; align-items: center; gap: 4px; }
#settings input[type="range"] { width: 80px; }
#settings select, #settings input[type="number"] { background: #0d1117; border: 1px solid #30363d; color: #c9d1d9; padding: 2px 6px; border-radius: 4px; font-size: 0.85em; }

.cursor::after { content: '▊'; animation: blink 1s infinite; }
@keyframes blink { 0%, 50% { opacity: 1; } 51%, 100% { opacity: 0; } }

#statsBar { padding: 4px 20px; font-size: 0.75em; color: #8b949e; background: #0d1117; border-top: 1px solid #30363d; display: none; }
#statsBar.visible { display: block; }
</style>
</head>
<body>

<div id="header">
    <h1 id="appTitle">LLM Chat</h1>
    <button class="btn" onclick="document.getElementById('fileInput').click()">📂 GGUF読み込み</button>
    <input type="file" id="fileInput" accept=".gguf">
    <div id="progressBar"><div id="progressFill"></div></div>
    <span id="modelStatus">モデル未読込</span>
    <button class="btn" id="resetBtn" onclick="resetChat()" style="margin-left:auto;" disabled>🗑 リセット</button>
    <button class="btn" onclick="toggleSettings()">⚙ 設定</button>
</div>

<div id="settings">
    <label>Temperature: <input type="range" id="tempSlider" min="0" max="2" step="0.1" value="0"><span id="tempVal">0</span></label>
    <label>Top-P: <input type="range" id="topPSlider" min="0" max="1" step="0.05" value="0.9"><span id="topPVal">0.9</span></label>
    <label>Top-K: <input type="number" id="topKInput" min="0" max="512" value="40" style="width:60px;"></label>
    <label>Max Tokens: <input type="number" id="maxTokensInput" min="1" max="4096" value="512" style="width:70px;"></label>
    <label>Thinking:
        <select id="thinkingMode" style="background:#0d1117; border:1px solid #30363d; color:#c9d1d9; padding:2px 6px; border-radius:4px; font-size:0.85em;">
            <option value="suppress">抑制</option>
            <option value="shorten">短縮</option>
            <option value="full">フル</option>
        </select>
    </label>
    <label>System: <input type="text" id="systemPrompt" placeholder="システムプロンプト (任意)" style="flex:1; background:#0d1117; border:1px solid #30363d; color:#c9d1d9; padding:2px 8px; border-radius:4px;"></label>
</div>

<div id="chatContainer"></div>

<div id="inputArea">
    <textarea id="messageInput" rows="1" placeholder="メッセージを入力..." disabled></textarea>
    <button class="btn primary" id="sendBtn" onclick="handleSendClick()" disabled>送信</button>
    <button class="btn" id="stopBtn" onclick="stopGeneration()" style="display:none;">停止</button>
</div>

<div id="statsBar"></div>

<script src="../src/gguf.js"></script>
<script src="../src/tokenizer.js"></script>
<script src="../src/tensor.js"></script>
<script src="../src/kv-cache.js"></script>
<script src="../src/qwen3-engine.js"></script>
<script src="../src/lfm2-engine.js"></script>
<script src="../src/webgpu.js"></script>

<script>
let engine = null;
let conversationHistory = [];
let isGenerating = false;
let currentAbort = null;

// --- File loading ---
document.getElementById('fileInput').addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    const statusEl = document.getElementById('modelStatus');
    const progressBar = document.getElementById('progressBar');
    const progressFill = document.getElementById('progressFill');

    statusEl.textContent = '読み込み中...';
    statusEl.className = '';
    progressBar.style.display = 'block';
    progressFill.style.width = '5%';

    try {
        // GGUFReader.fromFile() reads only the small header first, then loads
        // each tensor as a separate slice — avoids Chrome's ~2GB ArrayBuffer limit.
        const gguf = await GGUFReader.fromFile(file, (progress) => {
            progressFill.style.width = `${5 + progress * 88}%`;
        });
        progressFill.style.width = '93%';

        // Detect architecture and choose engine
        const archName = gguf.getKeyValue('general.architecture', '');
        const isLfm2   = archName === 'lfm2moe' || archName === 'lfm2';
        const arch     = gguf.getArch();

        let gpuLabel = '';
        if (isLfm2) {
            // LFM2: try GPU first, fall back to CPU
            try {
                engine   = await Lfm2GPUEngine.create(gguf);
                gpuLabel = ' | ⚡ WebGPU';
            } catch (gpuErr) {
                console.warn('[GPU-LFM2] Unavailable, falling back to CPU:', gpuErr.message);
                engine   = new Lfm2Engine(gguf);
                gpuLabel = ' | CPU';
            }
            document.getElementById('appTitle').textContent = 'LFM2 Chat';
        } else {
            // Qwen3 / Qwen3-MoE: try GPU first, fall back to CPU
            try {
                engine   = await Qwen3GPUEngine.create(gguf);
                gpuLabel = ' | ⚡ WebGPU';
            } catch (gpuErr) {
                console.warn('[GPU] Unavailable, falling back to CPU:', gpuErr.message);
                engine   = new Qwen3Engine(gguf);
                gpuLabel = ' | CPU';
            }
            document.getElementById('appTitle').textContent = 'Qwen3 Chat';
        }
        progressFill.style.width = '100%';

        const moeLabel = engine.isMoE ? ' MoE' : '';
        // For LFM2, show hybrid layer info
        const hybridLabel = isLfm2 ? ` (${arch.shortconvLCache > 0 ? '18conv+6attn' : 'hybrid'})` : '';
        statusEl.textContent = `${gguf.getKeyValue('general.name', file.name)} | ${arch.blockCount}L ${arch.embeddingLength}d${moeLabel}${hybridLabel}${gpuLabel} | 準備OK`;
        statusEl.className = 'ready';

        document.getElementById('messageInput').disabled = false;
        document.getElementById('sendBtn').disabled = false;
        document.getElementById('resetBtn').disabled = false;

        setTimeout(() => { progressBar.style.display = 'none'; }, 500);
    } catch (err) {
        console.error('GGUF読み込みエラー:', err);
        statusEl.textContent = `エラー: ${err.message}`;
        statusEl.className = '';
        progressBar.style.display = 'none';
    }
});

// --- Settings sliders ---
document.getElementById('tempSlider').addEventListener('input', (e) => {
    document.getElementById('tempVal').textContent = e.target.value;
});
document.getElementById('topPSlider').addEventListener('input', (e) => {
    document.getElementById('topPVal').textContent = e.target.value;
});

function toggleSettings() {
    document.getElementById('settings').classList.toggle('visible');
}

// --- Auto-resize textarea ---
const msgInput = document.getElementById('messageInput');
msgInput.addEventListener('input', () => {
    msgInput.style.height = 'auto';
    msgInput.style.height = Math.min(msgInput.scrollHeight, 200) + 'px';
});
msgInput.addEventListener('keydown', (e) => {
    if (e.key === 'Enter' && !e.shiftKey) {
        e.preventDefault();
        sendMessage();
    }
});

// --- Chat ---
function addMessage(role, content) {
    const container = document.getElementById('chatContainer');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `
        <div class="msg-avatar">${role === 'user' ? '👤' : '🤖'}</div>
        <div class="msg-content">${escapeHtml(content)}</div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div.querySelector('.msg-content');
}

function addStreamingMessage(role) {
    const container = document.getElementById('chatContainer');
    const div = document.createElement('div');
    div.className = `message ${role}`;
    div.innerHTML = `
        <div class="msg-avatar">${role === 'user' ? '👤' : '🤖'}</div>
        <div class="msg-content cursor"></div>
    `;
    container.appendChild(div);
    container.scrollTop = container.scrollHeight;
    return div.querySelector('.msg-content');
}

function escapeHtml(s) {
    return s.replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;');
}

function handleSendClick() {
    if (isGenerating) {
        stopGeneration();
    } else {
        sendMessage();
    }
}

function stopGeneration() {
    if (currentAbort) currentAbort.abort();
    isGenerating = false;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('stopBtn').style.display = 'none';
    const cursorEl = document.querySelector('.cursor');
    if (cursorEl) cursorEl.classList.remove('cursor');
}

async function sendMessage() {
    if (!engine || isGenerating) return;

    const input = document.getElementById('messageInput');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    conversationHistory.push({ role: 'user', content: text });
    addMessage('user', text);

    isGenerating = true;
    document.getElementById('sendBtn').disabled = false;
    document.getElementById('stopBtn').style.display = '';
    if (currentAbort) currentAbort.abort();
    currentAbort = new AbortController();

    // Build chat prompt
    const systemPrompt  = document.getElementById('systemPrompt').value.trim() || null;
    const thinkingMode  = document.getElementById('thinkingMode').value;
    const chatText = engine.formatChat(conversationHistory, systemPrompt, thinkingMode);
    const tokenIds = engine.tokenizer.tokenize(chatText, true, false);

    const assistantEl = addStreamingMessage('assistant');
    let decodedText = '';

    const startTime = performance.now();
    let tokenCount = 0;
    const generatedTokenIds = [];

    const statsBar = document.getElementById('statsBar');

    try {
        await engine.generate(tokenIds, {
            maxSteps:     parseInt(document.getElementById('maxTokensInput').value) || 512,
            temperature:  parseFloat(document.getElementById('tempSlider').value),
            topP:         parseFloat(document.getElementById('topPSlider').value),
            topK:         parseInt(document.getElementById('topKInput').value) || 40,
            thinkingMode,
            abortSignal:  currentAbort.signal,
            onPrefill(done, total) {
                if (total <= 1) return;
                const pct = Math.round(done / total * 100);
                statsBar.textContent = `⏳ prefill中... ${done}/${total} tokens (${pct}%)`;
                statsBar.className = 'visible';
            },
            onToken(tokenId) {
                tokenCount++;
                const now = ((performance.now() - startTime) / 1000).toFixed(2);
                if (tokenCount === 1) console.log(`[PERF] TTF: ${now}s`);
                generatedTokenIds.push(tokenId);
                decodedText = engine.tokenizer.decode(generatedTokenIds);
                assistantEl.textContent = decodedText;
                assistantEl.classList.add('cursor');
                document.getElementById('chatContainer').scrollTop = document.getElementById('chatContainer').scrollHeight;
            },
        });
    } catch (err) {
        console.error('生成エラー:', err);
        if (err.name !== 'AbortError') {
            assistantEl.textContent += ` [エラー: ${err.message}]`;
        }
    }

    const elapsed = ((performance.now() - startTime) / 1000).toFixed(1);
    const tps = (tokenCount / elapsed).toFixed(1);

    assistantEl.classList.remove('cursor');

    // Update conversation history with assistant response
    conversationHistory.push({ role: 'assistant', content: decodedText });

    console.log(`[PERF] total=${elapsed}s, tokens=${tokenCount}, ${tps} tok/s`);

    statsBar.textContent = `⚡ ${tokenCount} tokens / ${elapsed}s (${tps} tok/s)`;
    statsBar.className = 'visible';

    isGenerating = false;
    document.getElementById('stopBtn').style.display = 'none';
}

function resetChat() {
    if (isGenerating) stopGeneration();
    conversationHistory = [];
    document.getElementById('chatContainer').innerHTML = '';
    const statsBar = document.getElementById('statsBar');
    statsBar.textContent = '';
    statsBar.className = '';
    if (engine && engine.resetKVCache) engine.resetKVCache();
}

document.addEventListener('keydown', (e) => {
    if (e.key === 'Escape' && isGenerating) {
        stopGeneration();
    }
});
</script>

</body>
</html>
