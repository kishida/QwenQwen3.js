<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<title>BPE Tokenizer Test</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Consolas', 'Courier New', monospace; background: #1a1a2e; color: #e0e0e0; padding: 20px; }
h1 { color: #00d4ff; margin-bottom: 20px; font-size: 1.5em; }
.container { max-width: 1200px; margin: 0 auto; }
.file-input { margin-bottom: 20px; }
.file-input input { background: #16213e; color: #e0e0e0; padding: 10px 15px; border: 1px solid #444; border-radius: 4px; cursor: pointer; }
.status { color: #7cfc00; margin-bottom: 10px; font-size: 0.9em; }
.error { color: #ff6b6b; padding: 10px; background: #2a1a1e; border-radius: 4px; margin-top: 10px; display: none; }
textarea { width: 100%; height: 80px; background: #16213e; color: #e0e0e0; border: 1px solid #444; border-radius: 4px; padding: 10px; font-family: inherit; font-size: 0.9em; resize: vertical; margin-bottom: 10px; }
button { background: #00d4ff; color: #1a1a2e; border: none; padding: 8px 20px; border-radius: 4px; cursor: pointer; font-weight: bold; font-size: 0.9em; margin-right: 10px; }
button:hover { background: #00b8d4; }
button:disabled { background: #555; cursor: not-allowed; }
.result-section { margin-top: 20px; }
.tokens-display { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 10px; max-height: 400px; overflow-y: auto; padding: 10px; background: #16213e; border-radius: 4px; }
.token-chip { display: inline-flex; align-items: center; gap: 4px; background: #1a1a3e; padding: 2px 8px; border-radius: 3px; font-size: 0.8em; border: 1px solid #333; }
.token-chip .id { color: #ffd93d; min-width: 50px; text-align: right; }
.token-chip .text { color: #4fc3f7; max-width: 200px; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.decoded-section { margin-top: 15px; padding: 10px; background: #16213e; border-radius: 4px; }
.decoded-text { color: #7cfc00; word-break: break-all; font-size: 0.85em; }
.stats { margin-top: 10px; font-size: 0.85em; color: #ff9800; }
.progress-bar { width: 100%; height: 20px; background: #16213e; border-radius: 4px; overflow: hidden; margin: 10px 0; display: none; }
.progress-fill { height: 100%; background: linear-gradient(90deg, #00d4ff, #7cfc00); width: 0%; transition: width 0.3s; }
</style>
</head>
<body>
<div class="container">
    <h1>BPE Tokenizer Test</h1>

    <div class="file-input">
        <input type="file" id="fileInput" accept=".gguf">
    </div>

    <div class="progress-bar" id="progressBar">
        <div class="progress-fill" id="progressFill"></div>
    </div>

    <div class="status" id="status">GGUF ファイルを選択してください</div>
    <div class="error" id="errorMsg"></div>

    <textarea id="inputText" placeholder="トークナイズするテキストを入力...">Hello world! How are you?</textarea>

    <div>
        <button id="btnTokenize" disabled>トークナイズ</button>
        <label style="color:#e0e0e0; font-size:0.85em; margin-left:10px;">
            <input type="checkbox" id="chkBos"> BOS追加
        </label>
        <label style="color:#e0e0e0; font-size:0.85em; margin-left:10px;">
            <input type="checkbox" id="chkEos"> EOS追加
        </label>
    </div>

    <div class="result-section" id="resultSection" style="display:none;">
        <h2 style="color:#7cfc00; font-size:1em; margin-bottom:5px;">トークン (<span id="tokenCount">0</span>)</h2>
        <div class="stats" id="stats"></div>
        <div class="tokens-display" id="tokensDisplay"></div>

        <div class="decoded-section">
            <strong style="color:#ff9800;">デコード結果:</strong>
            <div class="decoded-text" id="decodedText"></div>
        </div>
    </div>
</div>

<script src="../src/gguf.js"></script>
<script src="../src/tokenizer.js"></script>
<script>
const fileInput = document.getElementById('fileInput');
const progressBar = document.getElementById('progressBar');
const progressFill = document.getElementById('progressFill');
const statusEl = document.getElementById('status');
const errorMsg = document.getElementById('errorMsg');
const btnTokenize = document.getElementById('btnTokenize');
const inputText = document.getElementById('inputText');
const resultSection = document.getElementById('resultSection');

let tokenizer = null;
let ggufReader = null;

fileInput.addEventListener('change', async (e) => {
    const file = e.target.files[0];
    if (!file) return;

    hideError();
    progressBar.style.display = 'block';
    progressFill.style.width = '10%';
    statusEl.textContent = 'ファイル読み込み中...';

    try {
        const buffer = await file.arrayBuffer();
        progressFill.style.width = '40%';

        ggufReader = new GGUFReader(buffer);
        progressFill.style.width = '60%';
        statusEl.textContent = 'ボキャブラリ読み込み中...';

        // Yield to UI thread for large vocab loading
        await new Promise(r => setTimeout(r, 10));

        tokenizer = new BPETokenizer();
        tokenizer.loadFromGGUF(ggufReader);
        progressFill.style.width = '90%';

        const arch = ggufReader.getArch();
        statusEl.textContent =
            `✓ ${file.name} (${(buffer.byteLength / 1024 / 1024).toFixed(1)} MB) | ` +
            `Vocab: ${tokenizer.vocabSize.toLocaleString()} | ` +
            `BPE merges: ${tokenizer.bpeRanks.size.toLocaleString()} | ` +
            `Arch: ${arch.architecture} | BOS: ${tokenizer.bosTokenId} | EOS: ${tokenizer.eosTokenId}`;

        btnTokenize.disabled = false;
        progressFill.style.width = '100%';
        setTimeout(() => { progressBar.style.display = 'none'; }, 500);
    } catch (err) {
        showError(err.message || err.toString());
        console.error(err);
        progressBar.style.display = 'none';
    }
});

btnTokenize.addEventListener('click', () => {
    if (!tokenizer) return;
    hideError();

    const text = inputText.value;
    const addBos = document.getElementById('chkBos').checked;
    const addEos = document.getElementById('chkEos').checked;

    statusEl.textContent = 'トークナイズ中...';
    btnTokenize.disabled = true;
    resultSection.style.display = 'none';

    // Run in microtask to let UI update, but also wrap globally
    requestAnimationFrame(() => {
        try {
            console.log('[UI] Starting tokenize on', text.length, 'chars');
            const t0 = performance.now();
            const tokens = tokenizer.tokenize(text, addBos, addEos);
            const tokenizeMs = (performance.now() - t0).toFixed(1);
            console.log('[UI] Got', tokens.length, 'tokens in', tokenizeMs, 'ms');

            const t1 = performance.now();
            const decoded = tokenizer.decode(tokens);
            const decodeMs = (performance.now() - t1).toFixed(1);

            document.getElementById('tokenCount').textContent = tokens.length;
            document.getElementById('stats').textContent =
                `トークナイズ: ${tokens.length} トークン (${tokenizeMs}ms) | デコード: ${decodeMs}ms`;

            const display = document.getElementById('tokensDisplay');
            let html = '';
            for (let i = 0; i < tokens.length; i++) {
                const tok = tokens[i];
                let idStr, textStr;
                if (typeof tok === 'string') {
                    // GPT-2 encoded byte fallback — show decoded form
                    const cp = tok.codePointAt(0);
                    idStr = cp >= 0x100 ? (cp - 0x100).toString(16) : tok.charCodeAt(0).toString();
                    textStr = JSON.stringify(tok);
                } else {
                    idStr = tok;
                    const rawTok = tokenizer.idToToken[tok] || '?';
                    textStr = JSON.stringify(gpt2Decode(rawTok));
                }
                const escaped = textStr.replace(/</g, '&lt;').replace(/>/g, '&gt;');
                html += `<span class="token-chip"><span class="id">${idStr}</span><span class="text" title="${escaped}">${escaped}</span></span>`;
            }
            display.innerHTML = html;

            const decodedEl = document.getElementById('decodedText');
            const origEscaped = text.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            const decEscaped = decoded.replace(/</g, '&lt;').replace(/>/g, '&gt;');
            decodedEl.innerHTML = `<div>原文: ${origEscaped}</div><div>デコード: ${decEscaped}</div>`;
            if (text === decoded) {
                decodedEl.innerHTML += '<div style="color:#7cfc00;margin-top:5px;">✓ 完全一致</div>';
            } else {
                decodedEl.innerHTML += '<div style="color:#ff6b6b;margin-top:5px;">✗ 不一致（空白処理の違いなど）</div>';
            }

            resultSection.style.display = 'block';
            statusEl.textContent = '✓ 完了 (' + tokenizeMs + 'ms)';
        } catch (innerErr) {
            console.error('[UI] Tokenize error:', innerErr);
            showError('トークナイズエラー: ' + (innerErr.message || String(innerErr)));
            statusEl.textContent = '✗ エラー';
        } finally {
            btnTokenize.disabled = false;
        }
    });
});

function showError(msg) {
    errorMsg.textContent = msg;
    errorMsg.style.display = 'block';
    statusEl.textContent = '';
}
function hideError() {
    errorMsg.style.display = 'none';
}
</script>
</body>
</html>
